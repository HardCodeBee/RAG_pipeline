# 离线 smoke 配置：用于快速检查完整链路，不用于正式检索或生成质量结论。
# YAML 内路径相对于本文件所在的 configs/ 目录解析。
paths:
  corpus: ../data/corpus
  artifacts_root: ../artifacts
  outputs_root: ../outputs

loader:
  type: pypdf
  recursive: false
  empty_page_policy: skip
chunking:
  chunk_size_tokens: 300
  # 这是“最多保留多少重叠词元”的预算；为保留完整句子，实际重叠可能更小或为 0。
  overlap_budget_tokens: 50
  tokenizer: regex

embedding:
  backend: hashing
  dimension: 384
  normalize: true
  query_prefix: ""
  document_prefix: ""

index:
  backend: numpy

retrieval:
  top_k: 5

context:
  max_tokens: null

prompt:
  version: fixed_qa_v1

generation:
  provider: extractive
  max_output_tokens: 512

logging:
  save_retrieved_text: true
  save_prompt: true
