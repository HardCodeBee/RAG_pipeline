# Single-paper offline smoke test for the locally saved QASPER validation split.
paths:
  corpus: ../data/processed/qasper/hf_dataset
  artifacts_root: ../artifacts
  outputs_root: ../outputs

loader:
  type: qasper
  split: validation
  max_documents: 1

chunking:
  chunk_size_tokens: 300
  overlap_budget_tokens: 50
  tokenizer: regex

embedding:
  backend: hashing
  dimension: 384
  normalize: true
  query_prefix: ""
  document_prefix: ""

index:
  backend: numpy

retrieval:
  top_k: 5

context:
  max_tokens: null

prompt:
  version: fixed_qa_v1

generation:
  provider: extractive
  max_output_tokens: 512

logging:
  save_retrieved_text: true
  save_prompt: false
